<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستضافة السحابي - استعادة كلمة المرور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .cyber-border {
            border: 2px solid rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-full gradient-bg text-gray-100">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="flex items-center justify-center mb-6">
                    <svg class="w-14 h-14 ml-3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="text-right">
                        <h1 class="text-2xl font-bold text-blue-400">استعادة كلمة المرور</h1>
                        <p class="text-gray-400 mt-1">منصة العملاء</p>
                    </div>
                </div>
            </div>

            <!-- Steps Indicator -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center">
                        <span class="text-white font-bold">1</span>
                    </div>
                    <div class="w-16 h-1 bg-blue-600 mx-2"></div>
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center">
                        <span class="text-gray-400 font-bold">2</span>
                    </div>
                    <div class="w-16 h-1 bg-gray-700 mx-2"></div>
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center">
                        <span class="text-gray-400 font-bold">3</span>
                    </div>
                </div>
                <span class="text-sm text-blue-400">الخطوة 1 من 3</span>
            </div>

            <!-- Reset Form -->
            <div class="cyber-border bg-slate-800 rounded-2xl p-8">
                <h2 class="text-xl font-bold text-blue-400 mb-6 text-right">أدخل بريدك الإلكتروني</h2>
                <p class="text-gray-400 mb-6 text-right text-sm">
                    سنرسل لك رابطاً لإعادة تعيين كلمة المرور على بريدك الإلكتروني المسجل
                </p>
                
                <form id="reset-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold mb-3 text-right">البريد الإلكتروني</label>
                        <input type="email" id="reset-email" required 
                               class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-xl 
                                      focus:outline-none focus:border-blue-500 text-right
                                      placeholder:text-gray-500"
                               placeholder="example@company.com">
                    </div>
                    
                    <!-- Security Check -->
                    <div class="bg-slate-900 p-4 rounded-xl">
                        <div class="flex items-center mb-3">
                            <input type="checkbox" id="not-robot" required 
                                   class="w-5 h-5 text-blue-600 bg-gray-700 border-gray-600 rounded ml-3">
                            <label for="not-robot" class="text-sm text-gray-300 cursor-pointer">
                                أنا لست روبوت
                            </label>
                        </div>
                        <p class="text-xs text-gray-400">هذا التحقق يساعدنا في منع الطلبات التلقائية</p>
                    </div>
                    
                    <button type="submit" id="reset-btn"
                            class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold 
                                   transition-all mt-4">
                        إرسال رابط الاستعادة
                    </button>
                </form>
                
                <div class="text-center mt-6 space-y-3">
                    <a href="client-login.html" 
                       class="block text-blue-400 hover:text-blue-300 text-sm font-semibold">
                        العودة لتسجيل الدخول
                    </a>
                    <a href="client-support.html" 
                       class="block text-gray-400 hover:text-gray-300 text-xs">
                        بحاجة للمساعدة؟ تواصل مع الدعم
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('reset-form');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value;
            const btn = document.getElementById('reset-btn');
            
            // التحقق من البريد الإلكتروني
            if (!isValidEmail(email)) {
                alert('يرجى إدخال بريد إلكتروني صحيح');
                return;
            }
            
            // عرض حالة التحميل
            btn.disabled = true;
            btn.innerHTML = `
                <div class="flex items-center justify-center">
                    <div class="spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full mr-3"></div>
                    جاري الإرسال...
                </div>
            `;
            
            // محاكاة إرسال البريد
            setTimeout(() => {
                alert(`تم إرسال رابط إعادة التعيين إلى: ${email}`);
                btn.disabled = false;
                btn.textContent = 'إرسال رابط الاستعادة';
                // التوجيه للخطوة التالية
                window.location.href = 'client-reset-verify.html';
            }, 2000);
        });
        
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
    </script>
</body>
</html>
